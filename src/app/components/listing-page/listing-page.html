<div class="listing">
  <div class="listing__top">
    <p class="listing__breadcrumb">Rewards / Search</p>
    <div class="listing__search-section">
      <h2 class="listing__title">Search</h2>
      <div class="listing__search-wrap">
        <svg class="listing__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#888" width="18" height="18">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input
          class="listing__search-input"
          type="text"
          placeholder="Search rewards..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()" />
      </div>
      <div class="listing__filters-row">
        <span class="listing__filters-label">Applied Filters:</span>
        <span class="listing__filter-chip">e-Voucher <button class="listing__chip-close">&times;</button></span>
        <span class="listing__filter-chip listing__filter-chip--clear">Clear Filters <button class="listing__chip-close">&times;</button></span>
      </div>
    </div>
  </div>

  <div class="listing__content">
    <aside class="listing__sidebar">
      <p class="listing__sidebar-heading">Categories</p>
      <ul class="listing__categories">
        <li class="listing__category listing__category--active">
          <span class="listing__category-check">&#10003;</span> e-Voucher
        </li>
        <li class="listing__category">Products</li>
        <li class="listing__category">Evergreen</li>
        <li class="listing__category">Fashion &amp; Retail</li>
      </ul>
    </aside>

    <div class="listing__main">
      <div class="listing__results-header">
        <span class="listing__count">{{ filteredRewards.length }} results found</span>
        <button class="listing__sort-btn" (click)="isSortOpen = true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="16" height="16">
            <path d="M3 18h6v-2H3v2zm0-5h12v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
          Sort
        </button>
      </div>
      <div class="listing__grid">
        <app-reward-card
          *ngFor="let reward of filteredRewards"
          [reward]="reward">
        </app-reward-card>
      </div>
    </div>
  </div>
</div>

<app-sort-panel
  [isOpen]="isSortOpen"
  (closed)="isSortOpen = false"
  (sortApplied)="onSortApplied($event)">
</app-sort-panel>
